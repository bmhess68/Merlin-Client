name: merlin-edge

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  installer-ui:
    build:
      context: ./web-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      MERLINREAD_PASSWORD: "${MERLINREAD_PASSWORD:-}"
      CONTROL_API_KEY: "${CONTROL_API_KEY:-}"
    volumes:
      - ./data:/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge
    logging: *default-logging

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    depends_on:
      - installer-ui
    ports:
      - "8554:8554"           # RTSP — reachable by cloud over Tailscale
      - "127.0.0.1:9997:9997" # API — local only
      - "127.0.0.1:9998:9998" # metrics — local only
      # mediamtx playback (9996) is intentionally NOT exposed.
      # The playback-shim service below sits in front of it on :9996.
    volumes:
      - ./data/mediamtx.yml:/mediamtx.yml:ro
      - ./data/recordings:/recordings
    networks:
      - edge
    logging: *default-logging

  relay:
    build:
      context: ./relay
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./data:/data
    networks:
      - edge
    logging: *default-logging

  playback-shim:
    build:
      context: ./playback-shim
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "9996:9996"           # public playback port — accepts ?user=&pass= from cloud Caddy,
                              # forwards to mediamtx with Basic auth injected
    environment:
      UPSTREAM: "http://mediamtx:9996"
    networks:
      - edge
    logging: *default-logging

networks:
  edge:
